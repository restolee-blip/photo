<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ 인생네컷 포토부스</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root{
  --pink:#ff6b9d;--purple:#c77dff;--mint:#06d6a0;
  --card:#fff;--text:#3d2b4e;--radius:20px;
  --shadow:0 8px 32px rgba(255,107,157,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(135deg,#ffeef8 0%,#f0e6ff 50%,#e6f4ff 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:10px;color:var(--text);overflow-x:hidden;}
h1{font-family:'Nanum Pen Script',cursive;font-size:2.2rem;color:var(--pink);
  text-shadow:2px 2px 0 #ffe0ef;margin-bottom:2px;letter-spacing:2px;}
.subtitle{font-size:0.75rem;color:#b084c9;margin-bottom:12px;letter-spacing:1px;}

.tabs{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,255,255,0.6);
  border-radius:40px;padding:5px;box-shadow:0 2px 12px rgba(200,120,200,0.12);}
.tab-btn{border:none;background:none;padding:7px 18px;border-radius:30px;
  font-size:0.82rem;font-family:'Noto Sans KR';cursor:pointer;color:#b084c9;font-weight:600;transition:all .25s;}
.tab-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;box-shadow:0 3px 10px rgba(255,107,157,0.35);}

/* ── CAMERA TAB ── */
.cam-layout{width:100%;max-width:900px;display:grid;grid-template-columns:1fr 265px;gap:14px;align-items:start;}
@media(max-width:680px){
  .cam-layout{grid-template-columns:1fr;}
  .cam-side{order:-1;display:flex;flex-direction:row;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .panel-card{min-width:200px;}
}
.camera-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}

/* composite view: video + bg canvas stacked */
.view-area{position:relative;background:#111;overflow:hidden;width:100%;}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;display:block;}
#handCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;display:none;}
#countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  font-family:'Nanum Pen Script',cursive;font-size:9rem;color:white;
  text-shadow:0 0 40px rgba(255,107,157,.9),3px 5px 0 rgba(0,0,0,.3);
  z-index:15;pointer-events:none;background:rgba(0,0,0,.15);}
.flash{position:absolute;inset:0;background:white;opacity:0;z-index:20;pointer-events:none;transition:opacity .08s;}

.palm-status{padding:7px 14px;display:flex;align-items:center;gap:8px;
  background:#fdf9ff;border-top:1px solid #f5eeff;font-size:0.75rem;}
.sdot{width:9px;height:9px;border-radius:50%;background:#e0d0f0;transition:all .3s;flex-shrink:0;}
.sdot.on{background:var(--pink);box-shadow:0 0 7px rgba(255,107,157,.5);}
.sdot.ready{background:var(--mint);box-shadow:0 0 7px rgba(6,214,160,.5);}

.shot-progress{padding:7px 14px;display:flex;align-items:center;gap:5px;
  background:#fdf9ff;border-top:1px solid #f5eeff;}
.dot{width:9px;height:9px;border-radius:50%;background:#e6d5f5;transition:all .3s;flex-shrink:0;}
.dot.taken{background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 2px 6px rgba(200,100,200,.4);}
.dot.cur{background:#ffd0e8;box-shadow:0 0 0 3px rgba(255,107,157,.3);}
.shot-label{font-size:0.72rem;color:#b084c9;font-weight:600;margin-left:auto;}

.cam-controls{padding:11px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.btn{border:none;border-radius:30px;padding:8px 18px;cursor:pointer;
  font-family:'Noto Sans KR';font-size:0.8rem;font-weight:700;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;
  box-shadow:0 4px 14px rgba(255,107,157,.4);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-secondary{background:#f5f0ff;color:var(--purple);border:1.5px solid #e0cfff;}
.btn-danger{background:#fff0f3;color:#e05c7a;border:1.5px solid #ffd0dc;}
.btn-sm{padding:6px 13px;font-size:0.74rem;}
.timer-row{display:flex;gap:4px;margin-left:auto;}
.tbtn{border:1.5px solid #e0cfff;background:#f5f0ff;color:var(--purple);border-radius:20px;
  padding:5px 10px;font-size:0.73rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.tbtn.active{background:var(--purple);color:white;border-color:var(--purple);}
.hand-guide{padding:8px 14px;background:#fff8ff;border-top:1px solid #f5eeff;
  font-size:0.73rem;color:#b084c9;line-height:1.6;}
.hand-guide strong{color:var(--pink);}

.panel-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px;}
.panel-title{font-size:0.73rem;font-weight:700;color:var(--purple);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;}
.cam-side{display:flex;flex-direction:column;gap:11px;}

.ratio-grid{display:flex;gap:6px;flex-wrap:wrap;}
.ratio-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
  border:2px solid #f0e6ff;border-radius:10px;padding:6px 8px;
  background:#faf5ff;cursor:pointer;transition:all .2s;font-size:0.67rem;color:#9a7ab8;}
.ratio-icon{background:#e6d5ff;border-radius:3px;}
.ratio-btn.active{border-color:var(--purple);background:#f0e6ff;color:var(--purple);font-weight:700;}
.shot-picker{display:flex;gap:5px;flex-wrap:wrap;}
.sshot{border:2px solid #f0e6ff;border-radius:10px;padding:5px 11px;background:#faf5ff;
  cursor:pointer;font-size:0.78rem;color:#9a7ab8;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.sshot.active{border-color:var(--pink);background:#fff0f6;color:var(--pink);}

input[type=range]{flex:1;-webkit-appearance:none;height:5px;
  background:linear-gradient(to right,var(--pink),var(--purple));border-radius:10px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:white;border:2.5px solid var(--pink);box-shadow:0 2px 5px rgba(255,107,157,.3);}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sval{font-size:0.75rem;color:var(--pink);font-weight:700;min-width:24px;text-align:right;}
.sl{font-size:0.68rem;color:#ccc;}

.bg-tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;}
.bg-tab{border:none;background:#f5f0ff;color:#b084c9;padding:4px 8px;border-radius:15px;
  font-size:0.68rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.bg-tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;}
.bg-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.sw{border-radius:5px;aspect-ratio:1;cursor:pointer;border:2.5px solid transparent;
  transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:0.75rem;}
.sw.active{border-color:var(--pink);}
.sw:hover{transform:scale(1.1);}
.stab{display:none;}.stab.active{display:block;}
.fchips{display:flex;flex-wrap:wrap;gap:4px;}
.fchip{border:1.5px solid #f0e6ff;border-radius:15px;padding:4px 9px;background:#faf5ff;
  cursor:pointer;font-size:0.67rem;color:#9a7ab8;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.fchip.active{border-color:var(--purple);background:#f0e6ff;color:var(--purple);font-weight:700;}
.upload-area{border:2px dashed #e0cfff;border-radius:10px;padding:12px;text-align:center;
  cursor:pointer;color:#b084c9;font-size:0.73rem;transition:all .2s;background:#fdf9ff;}
.upload-area:hover{border-color:var(--pink);background:#fff0f9;}
#bgUpload{display:none;}

/* ── RESULT TAB ── */
.result-layout{width:100%;max-width:900px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;}
@media(max-width:680px){.result-layout{grid-template-columns:1fr;}
  #stripWrap{display:flex;justify-content:center;flex-direction:column;align-items:center;}}
#stripCanvas{border-radius:12px;box-shadow:0 8px 30px rgba(200,100,200,.25);max-width:320px;width:100%;display:block;}
#stickerOverlay{position:absolute;top:0;left:0;}
#rslayer{position:relative;display:inline-block;}
.strip-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.result-side{display:flex;flex-direction:column;gap:11px;}

/* per-photo frame selector */
.photo-frame-wrap{display:flex;flex-direction:column;gap:8px;}
.pf-row{display:flex;align-items:center;gap:6px;}
.pf-label{font-size:0.7rem;color:#b084c9;font-weight:600;min-width:32px;}
.pf-chips{display:flex;gap:3px;flex-wrap:wrap;flex:1;}
.pf-chip{border:1.5px solid #f0e6ff;border-radius:8px;padding:3px 7px;background:#faf5ff;
  cursor:pointer;font-size:0.9rem;transition:all .2s;}
.pf-chip.active{border-color:var(--pink);background:#fff0f6;}

.sticker-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:100px;overflow-y:auto;}
.spick{font-size:1.4rem;cursor:pointer;padding:3px;border-radius:7px;
  transition:transform .2s;background:#faf5ff;border:1.5px solid #f0e6ff;}
.spick:hover{transform:scale(1.25);background:#ffe0f0;}

.text-row{display:flex;gap:5px;align-items:center;margin-bottom:6px;}
.text-row input{flex:1;border:1.5px solid #e0cfff;border-radius:10px;padding:6px 9px;
  font-family:'Noto Sans KR';font-size:0.78rem;outline:none;color:var(--text);background:#fdf9ff;}
.text-row input:focus{border-color:var(--pink);}
.crow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.cdot{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.cdot.active{border-color:var(--text);transform:scale(1.2);}

/* handwriting canvas */
#drawCanvas{border-radius:10px;border:1.5px solid #e0cfff;cursor:crosshair;
  touch-action:none;display:block;width:100%;background:transparent;}
.draw-tools{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.draw-color{width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.draw-color.active{border-color:#333;transform:scale(1.2);}
.draw-size{display:flex;gap:3px;}
.dsz{border:1.5px solid #e0cfff;border-radius:8px;padding:3px 8px;background:#faf5ff;
  cursor:pointer;font-size:0.7rem;color:#9a7ab8;font-family:'Noto Sans KR';transition:all .2s;}
.dsz.active{border-color:var(--purple);background:#f0e6ff;color:var(--purple);}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);
  background:linear-gradient(135deg,var(--pink),var(--purple));color:white;
  padding:8px 20px;border-radius:30px;font-size:0.8rem;font-weight:700;
  box-shadow:0 6px 24px rgba(200,100,200,.4);opacity:0;transition:all .35s;
  z-index:1000;pointer-events:none;font-family:'Noto Sans KR';white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<h1>✨ 인생네컷 포토부스</h1>
<p class="subtitle">🤚 손바닥을 펼치면 자동 촬영 시작!</p>

<div class="tabs">
  <button class="tab-btn active" id="tCam" onclick="switchTab('cam')">📷 촬영</button>
  <button class="tab-btn" id="tRes" onclick="switchTab('res')">🎨 꾸미기 & 결과</button>
</div>

<!-- ══ CAMERA TAB ══ -->
<div id="camTab" class="cam-layout">
  <div class="camera-wrap">
    <div class="view-area" id="viewArea" style="height:360px;">
      <canvas id="bgCanvas"></canvas>
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="handCanvas"></canvas>
      <div id="countdown"></div>
      <div class="flash" id="flash"></div>
    </div>
    <div class="palm-status">
      <div class="sdot" id="sdot"></div>
      <span id="stext">카메라 연결 중...</span>
    </div>
    <div class="shot-progress">
      <span style="font-size:0.72rem;color:#b084c9;font-weight:600;">촬영</span>
      <div id="dotRow" style="display:flex;gap:5px;margin-left:8px;align-items:center;"></div>
      <span class="shot-label" id="shotLabel">0 / 4</span>
    </div>
    <div class="cam-controls">
      <button class="btn btn-primary btn-sm" onclick="manualCapture()">📸 직접 찍기</button>
      <button class="btn btn-secondary btn-sm" onclick="resetShots()">🔄 다시</button>
      <button class="btn btn-secondary btn-sm" onclick="flipCam()">🔀 반전</button>
      <div class="timer-row">
        <button class="tbtn" onclick="setTimer(0,this)">즉시</button>
        <button class="tbtn active" onclick="setTimer(3,this)">3초</button>
        <button class="tbtn" onclick="setTimer(5,this)">5초</button>
        <button class="tbtn" onclick="setTimer(10,this)">10초</button>
      </div>
    </div>
    <div class="hand-guide">
      🤚 <strong>손바닥을 활짝 펼쳐</strong> 카메라에 보여주세요 → <strong>3초 카운트다운</strong> 후 자동 촬영!
    </div>
  </div>

  <div class="cam-side">
    <div class="panel-card">
      <div class="panel-title">📷 컷 수</div>
      <div class="shot-picker">
        <button class="sshot" onclick="setShotCount(1,this)">1컷</button>
        <button class="sshot active" onclick="setShotCount(4,this)">4컷</button>
        <button class="sshot" onclick="setShotCount(6,this)">6컷</button>
        <button class="sshot" onclick="setShotCount(8,this)">8컷</button>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">📐 비율</div>
      <div class="ratio-grid">
        <button class="ratio-btn active" onclick="setRatio(3,4,this)"><div class="ratio-icon" style="width:20px;height:28px;"></div>3:4</button>
        <button class="ratio-btn" onclick="setRatio(1,1,this)"><div class="ratio-icon" style="width:24px;height:24px;"></div>1:1</button>
        <button class="ratio-btn" onclick="setRatio(9,16,this)"><div class="ratio-icon" style="width:15px;height:28px;"></div>9:16</button>
        <button class="ratio-btn" onclick="setRatio(4,3,this)"><div class="ratio-icon" style="width:28px;height:20px;"></div>4:3</button>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">🎨 배경 <span style="font-size:0.65rem;color:#ccc;font-weight:400;">(카메라 위에 합성)</span></div>
      <div class="bg-tabs">
        <button class="bg-tab active" onclick="switchBgTab('c',this)">없음</button>
        <button class="bg-tab" onclick="switchBgTab('g',this)">그라데</button>
        <button class="bg-tab" onclick="switchBgTab('p',this)">패턴</button>
        <button class="bg-tab" onclick="switchBgTab('u',this)">내 사진</button>
      </div>
      <div id="bgC" class="stab active">
        <div class="bg-grid" id="colorGrid"></div>
      </div>
      <div id="bgG" class="stab"><div class="bg-grid" id="gradGrid"></div></div>
      <div id="bgP" class="stab"><div class="bg-grid" id="patGrid"></div></div>
      <div id="bgU" class="stab">
        <div class="upload-area" onclick="document.getElementById('bgUpload').click()">
          <div style="font-size:1.5rem;margin-bottom:3px;">🖼</div>내 사진 불러오기
        </div>
        <input type="file" id="bgUpload" accept="image/*" onchange="loadBgImg(this)">
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">☀️ 밝기 & 흐림</div>
      <div class="srow"><span class="sl">어둡</span>
        <input type="range" id="brSlider" min="0.3" max="2" step="0.05" value="1" oninput="applyVF()">
        <span class="sl">밝음</span><span class="sval" id="brVal">1.0</span>
      </div>
      <div class="srow"><span class="sl">선명</span>
        <input type="range" id="blSlider" min="0" max="15" step="0.5" value="0" oninput="applyVF()">
        <span class="sl">흐림</span><span class="sval" id="blVal">0</span>
      </div>
      <div class="panel-title" style="margin-top:8px;">🎞 필터</div>
      <div class="fchips" id="camFilterChips"></div>
    </div>
  </div>
</div>

<!-- ══ RESULT TAB ══ -->
<div id="resTab" style="display:none;" class="result-layout">
  <div id="stripWrap">
    <div id="rslayer">
      <canvas id="stripCanvas"></canvas>
      <canvas id="stickerOverlay"></canvas>
    </div>
    <div class="strip-actions">
      <button class="btn btn-primary btn-sm" onclick="savePhoto()">💾 저장</button>
      <button class="btn btn-danger btn-sm" onclick="clearResult()">🗑 결과 지우기</button>
      <button class="btn btn-secondary btn-sm" onclick="switchTab('cam')">📷 다시 찍기</button>
    </div>
    <p style="font-size:0.68rem;color:#c0a0d0;margin-top:5px;text-align:center;">저장 시 꾸미기 내용 모두 포함 📱</p>
  </div>

  <div class="result-side">

    <!-- Per-photo frames -->
    <div class="panel-card">
      <div class="panel-title">🖼 사진별 프레임</div>
      <div class="photo-frame-wrap" id="photoFrameWrap"></div>
    </div>

    <!-- Stickers -->
    <div class="panel-card">
      <div class="panel-title">🎀 스티커</div>
      <div class="sticker-grid" id="stickerGrid"></div>
      <button class="btn btn-danger btn-sm" style="margin-top:7px;width:100%;" onclick="clearOverlayItems()">스티커 전체 삭제</button>
    </div>

    <!-- Text -->
    <div class="panel-card">
      <div class="panel-title">✏️ 텍스트</div>
      <div class="text-row">
        <input type="text" id="txtIn" placeholder="한 줄 메모..." maxlength="30">
        <button class="btn btn-primary btn-sm" onclick="addText()">추가</button>
      </div>
      <div class="crow" id="txtColors"></div>
    </div>

    <!-- Handwriting -->
    <div class="panel-card">
      <div class="panel-title">✍️ 손글씨</div>
      <div class="draw-tools">
        <div class="draw-color active" id="dc0" style="background:#ff6b9d;" onclick="setDrawColor('#ff6b9d',this)"></div>
        <div class="draw-color" id="dc1" style="background:#c77dff;" onclick="setDrawColor('#c77dff',this)"></div>
        <div class="draw-color" id="dc2" style="background:#ffd166;" onclick="setDrawColor('#ffd166',this)"></div>
        <div class="draw-color" id="dc3" style="background:#06d6a0;" onclick="setDrawColor('#06d6a0',this)"></div>
        <div class="draw-color" id="dc4" style="background:#4facfe;" onclick="setDrawColor('#4facfe',this)"></div>
        <div class="draw-color" id="dc5" style="background:#1a1a2e;" onclick="setDrawColor('#1a1a2e',this)"></div>
        <div class="draw-color" id="dc6" style="background:#ffffff;border:1.5px solid #ddd;" onclick="setDrawColor('#ffffff',this)"></div>
        <div class="draw-size">
          <button class="dsz active" onclick="setDrawSize(3,this)">S</button>
          <button class="dsz" onclick="setDrawSize(6,this)">M</button>
          <button class="dsz" onclick="setDrawSize(12,this)">L</button>
        </div>
      </div>
      <canvas id="drawCanvas" height="100"></canvas>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="stampDrawing()">📌 붙이기</button>
        <button class="btn btn-danger btn-sm" style="flex:1;" onclick="clearDrawCanvas()">지우기</button>
      </div>
      <div style="font-size:0.68rem;color:#ccc;margin-top:4px;">손글씨 쓰고 붙이기 → 스트립에 추가돼요</div>
    </div>

    <!-- Post correction -->
    <div class="panel-card">
      <div class="panel-title">💎 후보정</div>
      <div class="srow"><span class="sl">어둡</span>
        <input type="range" id="rBr" min="0.4" max="1.8" step="0.05" value="1" oninput="redrawStrip()">
        <span class="sl">밝음</span>
      </div>
      <div class="srow"><span class="sl">선명</span>
        <input type="range" id="rBl" min="0" max="8" step="0.5" value="0" oninput="redrawStrip()">
        <span class="sl">흐림</span>
      </div>

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  // roundRect polyfill
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      r=Math.min(r,w/2,h/2);
      this.moveTo(x+r,y);
      this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
      this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
      this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
      this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
      this.closePath();
    };
  }
  buildColorGrid(); buildGradGrid(); buildPatGrid();
  buildFilterChips('camFilterChips',false);
  buildFilterChips('resFilterChips',true);
  buildStickerGrid(); buildTxtColors();
  buildDotRow(); updateAspect();
  document.getElementById('brVal').textContent='1.0';
  document.getElementById('blVal').textContent='0';
  await startCam();
  initMediaPipe();
  initOverlay();
  initDrawCanvas();
}

async function startCam(){

    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    const v=document.getElementById('videoEl');
    v.srcObject=stream;
    v.style.transform='scaleX(-1)';
    v.onloadeddata=()=>{
      v.play().catch(()=>{});
      videoReady=true;
      setStat('on','🤚 손바닥을 카메라에 보여주세요!');
      startBgLoop();
    };
    toast('📷 카메라 연결됨!');
  }catch(e){
    setStat('','⚠️ 카메라 권한을 허용해주세요 (HTTPS 필요)');
    toast('카메라 접근 권한이 필요해요');
  }
}
function flipCam(){

function setStat(cls,msg){

// ══════════════════════════════════════════
// BG CANVAS LOOP (draws overlay behind video)
// bgCanvas is behind video, video is always visible
// We use CSS mix-blend-mode to overlay bg on video
// Actually: bgCanvas draws the effect as an overlay ON TOP of video with transparency
// Video stays visible always. bgCanvas drawn on top with opacity for overlay effects.
// ══════════════════════════════════════════
function startBgLoop(){
  if(bgAnimFrame) cancelAnimationFrame(bgAnimFrame);
  const bc=document.getElementById('bgCanvas');
  const va=document.getElementById('viewArea');
  // bgCanvas is ABOVE video (z-index:3) for overlay blending, but normally transparent
  // When bg selected: draw color/gradient/pattern on bgCanvas with some opacity
  // Video stays behind and visible through opacity
  bc.style.zIndex='3';
  bc.style.pointerEvents='none';
  function loop(){
    bc.width=va.offsetWidth; bc.height=va.offsetHeight;
    const ctx=bc.getContext('2d');
    ctx.clearRect(0,0,bc.width,bc.height);
    if(bgType==='none'||bgType===null){
      // nothing drawn, video fully visible
    } else if(bgType==='color'){
      // draw color at 85% opacity so it overlays video
      ctx.globalAlpha=0.88;
      ctx.fillStyle=bgVal;
      ctx.fillRect(0,0,bc.width,bc.height);
      ctx.globalAlpha=1;
    } else if(bgType==='grad'){
      ctx.globalAlpha=0.88;
      drawGrad(ctx,bgVal,bc.width,bc.height);
      ctx.globalAlpha=1;
    } else if(bgType==='pat'){
      ctx.globalAlpha=0.88;
      ctx.fillStyle=bgVal.b;
      ctx.fillRect(0,0,bc.width,bc.height);
      drawPat(ctx,bgVal.p,bc.width,bc.height);
      ctx.globalAlpha=1;
    } else if(bgType==='image'&&bgImgObj){
      ctx.globalAlpha=0.9;
      const s=Math.max(bc.width/bgImgObj.width,bc.height/bgImgObj.height);
      ctx.drawImage(bgImgObj,(bc.width-bgImgObj.width*s)/2,(bc.height-bgImgObj.height*s)/2,bgImgObj.width*s,bgImgObj.height*s);
      ctx.globalAlpha=1;
    }
    bgAnimFrame=requestAnimationFrame(loop);
  }
  loop();
}

// ══════════════════════════════════════════
// MEDIAPIPE — skeleton hidden, only status shown
// ══════════════════════════════════════════
function initMediaPipe(){
  if(typeof Hands==='undefined'){
    setStat('','손 인식 로딩 실패 — 직접 찍기 사용 가능');
    return;
  }
  mpHands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  mpHands.setOptions({maxNumHands:1,modelComplexity:0,
    minDetectionConfidence:0.65,minTrackingConfidence:0.5});
  mpHands.onResults(onHandResults);
  const v=document.getElementById('videoEl');
  mpCam=new Camera(v,{
    onFrame:async()=>{if(videoReady&&mpHands)await mpHands.send({image:v});},
    width:640,height:480
  });
  mpCam.start();
}

function isPalmOpen(lm){
  const tips=[8,12,16,20],mcps=[5,9,13,17];
  let open=0;
  for(let i=0;i<tips.length;i++) if(lm[tips[i]].y<lm[mcps[i]].y) open++;
  return open>=3&&Math.abs(lm[4].x-lm[2].x)>0.05;
}

function onHandResults(res){
  // handCanvas is hidden — no visual feedback drawn
  if(cdRunning||isCapturing) return;
  if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
    const lm=res.multiHandLandmarks[0];
    const open=isPalmOpen(lm);
    if(open){
      if(!palmHeld){
        palmHeld=true; palmHeldStart=Date.now();
        setStat('ready','✅ 손바닥 감지! 잠시 유지...');
      } else if(Date.now()-palmHeldStart>700){
        palmHeld=false;
        startCapture();
      }
    } else {
      palmHeld=false;
      if(!cdRunning) setStat('on','🤚 손바닥을 활짝 펴주세요!');
    }
  } else {
    palmHeld=false;
    if(!cdRunning&&!isCapturing) setStat('on','🤚 손바닥을 카메라에 보여주세요!');
  }
}

// ══════════════════════════════════════════
// CAPTURE
// ══════════════════════════════════════════
function manualCapture(){startCapture();}
function startCapture(){
  if(isCapturing||cdRunning) return;
  if(shots.length>=shotCount){toast('다 찍었어요! 🔄 다시 버튼 누르세요');return;}
  if(!videoReady){toast('카메라 준비 중...');return;}
  if(timerDelay>0){
    cdRunning=true;
    setStat('ready',`⏱ ${timerDelay}초 후 촬영!`);
    runCD(timerDelay,()=>{cdRunning=false;doCapture();});
  } else doCapture();
}
function runCD(n,cb){
  const el=document.getElementById('countdown');
  el.style.display='flex'; el.textContent=n;
  if(n<=0){el.style.display='none';cb();return;}
  setTimeout(()=>runCD(n-1,cb),1000);
}
function doCapture(){
  isCapturing=true;
  const fl=document.getElementById('flash');
  fl.style.opacity='0.95';
  setTimeout(()=>fl.style.opacity='0',100);

  const va=document.getElementById('viewArea');
  const video=document.getElementById('videoEl');
  const bc=document.getElementById('bgCanvas');
  const vw=va.offsetWidth, vh=va.offsetHeight;
  const off=document.createElement('canvas');
  const dpr=Math.min(window.devicePixelRatio,2);
  off.width=vw*dpr; off.height=vh*dpr;
  const ctx=off.getContext('2d');
  ctx.scale(dpr,dpr);

  // 1. Draw video
  ctx.save();
  if(isMirrored){ctx.translate(vw,0);ctx.scale(-1,1);}
  const br=parseFloat(document.getElementById('brSlider').value);
  const bl=parseFloat(document.getElementById('blSlider').value);
  let f=`brightness(${br})`;
  if(camFilter!=='none') f+=' '+camFilter;
  if(bl>0) f+=` blur(${bl}px)`;
  ctx.filter=f;
  ctx.drawImage(video,0,0,vw,vh);
  ctx.restore();
  ctx.filter='none';

  // 2. Draw bg overlay on top
  if(bgType!=='none'&&bgType!==null) ctx.drawImage(bc,0,0,vw,vh);

  shots.push(off);
  perPhotoFrames.push('none');
  updateDots(); updateLabel();
  isCapturing=false;

  if(shots.length>=shotCount){
    setTimeout(()=>{buildStrip();buildPhotoFrameUI();switchTab('res');},300);
    toast('🎉 모든 컷 촬영 완료!');
  } else {
    toast(`📸 ${shots.length}/${shotCount} 촬영 완료!`);
    setStat('on','🤚 손바닥을 보여주면 다음 컷!');
  }
}

// ══════════════════════════════════════════
// STRIP
// ══════════════════════════════════════════
const FW=290;
function buildStrip(){
  const sc=document.getElementById('stripCanvas');
  const gap=8, pad=16;
  const cols=shotCount>=6?2:1;
  const rows=Math.ceil(shots.length/cols);
  const fw=cols===2?Math.floor(FW/2)-gap/2:FW;
  const fh=Math.round(fw*rH/rW);
  const sw=cols*fw+(cols-1)*gap+pad*2;
  const sh=rows*fh+(rows-1)*gap+pad*2+42;
  sc.width=sw; sc.height=sh;
  sc.style.width=Math.min(sw,320)+'px';
  sc.style.height='auto';
  const ctx=sc.getContext('2d');

  // Strip background white
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,sw,sh);

  const rb=parseFloat(document.getElementById('rBr').value);
  const rbl=parseFloat(document.getElementById('rBl').value);
  const rf=resultFilter;

  shots.forEach((shot,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=pad+col*(fw+gap), y=pad+row*(fh+gap);
    const frameId=perPhotoFrames[i]||'none';

    // Draw frame bg
    drawOneFrameBg(ctx,x,y,fw,fh,frameId);

    // Draw photo
    ctx.save();
    ctx.beginPath(); ctx.roundRect(x,y,fw,fh,5); ctx.clip();
    let f=`brightness(${rb})`;
    if(rf!=='none') f+=' '+rf;
    if(rbl>0) f+=` blur(${rbl}px)`;
    ctx.filter=f;
    ctx.drawImage(shot,x,y,fw,fh);
    ctx.restore();
    ctx.filter='none';

    // Draw frame decoration on top
    drawOneFrameTop(ctx,x,y,fw,fh,frameId);
  });

  // Date stamp
  const now=new Date();
  const ds=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  ctx.fillStyle='#c77dff';
  ctx.font='700 11px "Noto Sans KR",sans-serif';
  ctx.textAlign='center';
  ctx.fillText('✨ '+ds+' ✨',sw/2,sh-13);
  resizeOC();
}

function drawOneFrameBg(ctx,x,y,w,h,frameId){
  const borderMap={
    none:null, white:'#eee', black:'#111', pink:'#ffb3d0',
    polaroid:'#e5e5e5', film:'#000', star:'#ffd166', flower:'#ff9ec4', rainbow:null
  };
  const b=borderMap[frameId];
  if(b){
    ctx.strokeStyle=b; ctx.lineWidth=6;
    ctx.strokeRect(x+3,y+3,w-6,h-6);
  }
  if(frameId==='film'){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(x,y,8,h); ctx.fillRect(x+w-8,y,8,h);
    ctx.fillStyle='#fff';
    for(let j=0;j<6;j++){
      ctx.fillRect(x+1,y+8+j*(h-16)/5,6,8);
      ctx.fillRect(x+w-7,y+8+j*(h-16)/5,6,8);
    }
  }
}
function drawOneFrameTop(ctx,x,y,w,h,frameId){
  if(frameId==='rainbow'){
    const cols=['#ff6b9d','#ffd166','#06d6a0','#4facfe','#c77dff'];
    cols.forEach((c,i)=>{
      ctx.fillStyle=c;
      ctx.fillRect(x+i*(w/5),y,w/5,5);
      ctx.fillRect(x+i*(w/5),y+h-5,w/5,5);
    });
  }
  if(frameId==='star'){
    ctx.font='12px serif'; ctx.textAlign='left';
    for(let px=x+2;px<x+w-10;px+=22){ctx.fillText('⭐',px,y+13);ctx.fillText('⭐',px,y+h-2);}
  }
  if(frameId==='flower'){
    ctx.font='11px serif'; ctx.textAlign='left';
    for(let px=x+2;px<x+w-10;px+=20){ctx.fillText('🌸',px,y+12);ctx.fillText('🌸',px,y+h-2);}
  }
  if(frameId==='polaroid'){
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(x,y+h-20,w,20);
  }
}

function redrawStrip(){if(shots.length>0)buildStrip();}

// ══════════════════════════════════════════
// PER-PHOTO FRAME UI
// ══════════════════════════════════════════
function buildPhotoFrameUI(){
  const wrap=document.getElementById('photoFrameWrap');
  wrap.innerHTML='';
  shots.forEach((_,i)=>{
    const row=document.createElement('div');
    row.className='pf-row';
    const lbl=document.createElement('div');
    lbl.className='pf-label';
    lbl.textContent=`📷${i+1}`;
    row.appendChild(lbl);
    const chips=document.createElement('div');
    chips.className='pf-chips';
    PFRAMES.forEach(f=>{
      const c=document.createElement('button');
      c.className='pf-chip'+(perPhotoFrames[i]===f.id?' active':'');
      c.textContent=f.i;
      c.title=f.id;
      c.onclick=()=>{
        perPhotoFrames[i]=f.id;
        chips.querySelectorAll('.pf-chip').forEach(x=>x.classList.remove('active'));
        c.classList.add('active');
        redrawStrip();
      };
      chips.appendChild(c);
    });
    row.appendChild(chips);
    wrap.appendChild(row);
  });
}

// ══════════════════════════════════════════
// OVERLAY (stickers + texts + handwriting stamps)
// ══════════════════════════════════════════
function initOverlay(){
  const oc=document.getElementById('stickerOverlay');
  oc.addEventListener('mousedown',ocDown);
  oc.addEventListener('touchstart',ocTouchStart,{passive:false});
  document.addEventListener('mousemove',ocMove);
  document.addEventListener('touchmove',ocTouchMove,{passive:false});
  document.addEventListener('mouseup',()=>dragging=null);
  document.addEventListener('touchend',()=>dragging=null);
}
function resizeOC(){
  const sc=document.getElementById('stripCanvas');
  const oc=document.getElementById('stickerOverlay');
  oc.width=sc.width; oc.height=sc.height;
  requestAnimationFrame(()=>{
    const r=sc.getBoundingClientRect();
    oc.style.width=r.width+'px'; oc.style.height=r.height+'px';
    renderOC();
  });
}
function renderOC(){
  const oc=document.getElementById('stickerOverlay');
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  overlayItems.forEach(it=>{
    if(it.type==='sticker'){
      ctx.font=`${it.fs}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(it.e,it.x,it.y);
    } else if(it.type==='text'){
      ctx.font=`700 ${it.fs}px "Noto Sans KR",sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=3;
      ctx.strokeText(it.t,it.x,it.y);
      ctx.fillStyle=it.c; ctx.fillText(it.t,it.x,it.y);
    } else if(it.type==='drawing'){
      ctx.drawImage(it.img,it.x,it.y,it.w,it.h);
    }
  });
}
function ocPos(e){
  const oc=document.getElementById('stickerOverlay');
  const r=oc.getBoundingClientRect();
  return{x:(e.clientX-r.left)*oc.width/r.width, y:(e.clientY-r.top)*oc.height/r.height};
}
function ocTPos(e){const t=e.touches[0];return ocPos({clientX:t.clientX,clientY:t.clientY});}
function hitTest(p){
  for(let i=overlayItems.length-1;i>=0;i--){
    const it=overlayItems[i];
    const r=(it.fs||40)*0.8;
    if(Math.abs(p.x-it.x)<r&&Math.abs(p.y-it.y)<r) return i;
  }
  return -1;
}
function ocDown(e){const p=ocPos(e),idx=hitTest(p);if(idx>=0){dragging=idx;dragOX=p.x-overlayItems[idx].x;dragOY=p.y-overlayItems[idx].y;e.preventDefault();}}
function ocTouchStart(e){const p=ocTPos(e),idx=hitTest(p);if(idx>=0){dragging=idx;dragOX=p.x-overlayItems[idx].x;dragOY=p.y-overlayItems[idx].y;e.preventDefault();}}
function ocMove(e){if(dragging===null)return;const p=ocPos(e);overlayItems[dragging].x=p.x-dragOX;overlayItems[dragging].y=p.y-dragOY;renderOC();}
function ocTouchMove(e){if(dragging===null)return;const p=ocTPos(e);overlayItems[dragging].x=p.x-dragOX;overlayItems[dragging].y=p.y-dragOY;renderOC();e.preventDefault();}

function addSticker(em){
  const oc=document.getElementById('stickerOverlay');
  if(!oc.width) return;
  overlayItems.push({type:'sticker',e:em,x:oc.width*(0.2+Math.random()*0.6),y:oc.height*(0.15+Math.random()*0.7),fs:38+Math.random()*18});
  renderOC();
}
function addText(){
  const val=document.getElementById('txtIn').value.trim();
  if(!val) return;
  const oc=document.getElementById('stickerOverlay');
  if(!oc.width){toast('먼저 사진을 찍어주세요!');return;}
  overlayItems.push({type:'text',t:val,x:oc.width/2,y:oc.height*(0.15+Math.random()*0.7),fs:22,c:txtColor});
  document.getElementById('txtIn').value='';
  renderOC();
  toast('✏️ 추가됨! 드래그로 이동하세요');
}
function clearOverlayItems(){overlayItems=[];renderOC();}

// ══════════════════════════════════════════
// HANDWRITING
// ══════════════════════════════════════════
function initDrawCanvas(){
  const dc=document.getElementById('drawCanvas');
  // set width after layout
  requestAnimationFrame(()=>{
    dc.width=dc.offsetWidth||260; dc.height=100;
  });
  dc.addEventListener('mousedown',dwStart);
  dc.addEventListener('mousemove',dwMove);
  dc.addEventListener('mouseup',dwEnd);
  dc.addEventListener('touchstart',dwTStart,{passive:false});
  dc.addEventListener('touchmove',dwTMove,{passive:false});
  dc.addEventListener('touchend',dwEnd);
}
function dwCtx(){return document.getElementById('drawCanvas').getContext('2d');}
function dwStart(e){
  isDrawing=true;
  const r=e.target.getBoundingClientRect();
  lastDX=e.clientX-r.left; lastDY=e.clientY-r.top;
}
function dwMove(e){
  if(!isDrawing) return;
  const r=e.target.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const ctx=dwCtx();
  ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(lastDX,lastDY); ctx.lineTo(x,y); ctx.stroke();
  lastDX=x; lastDY=y;
}
function dwEnd(){isDrawing=false;}
function dwTStart(e){
  e.preventDefault();
  const t=e.touches[0];
  const r=e.target.getBoundingClientRect();
  isDrawing=true; lastDX=t.clientX-r.left; lastDY=t.clientY-r.top;
}
function dwTMove(e){
  e.preventDefault(); if(!isDrawing) return;
  const t=e.touches[0];
  const r=e.target.getBoundingClientRect();
  const x=t.clientX-r.left, y=t.clientY-r.top;
  const ctx=dwCtx();
  ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(lastDX,lastDY); ctx.lineTo(x,y); ctx.stroke();
  lastDX=x; lastDY=y;
}
function clearDrawCanvas(){
  const dc=document.getElementById('drawCanvas');
  dwCtx().clearRect(0,0,dc.width,dc.height);
}
function stampDrawing(){
  const dc=document.getElementById('drawCanvas');
  const oc=document.getElementById('stickerOverlay');
  if(!oc.width){toast('먼저 사진을 찍어주세요!');return;}
  // Convert drawCanvas to image and place on overlay
  const img=new Image();
  img.onload=()=>{
    const scale=oc.width/dc.offsetWidth;
    overlayItems.push({
      type:'drawing',img,
      x:oc.width*0.1, y:oc.height*0.1,
      w:dc.width*scale*0.8, h:dc.height*scale*0.8,
      fs:40
    });
    renderOC();
    clearDrawCanvas();
    toast('✍️ 손글씨 붙였어요! 드래그로 이동하세요');
  };
  img.src=dc.toDataURL();
}
function setDrawColor(c,el){
  drawColor=c;
  document.querySelectorAll('.draw-color').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}
function setDrawSize(s,el){
  drawSize=s;
  document.querySelectorAll('.dsz').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

// ══════════════════════════════════════════
// SAVE & CLEAR RESULT
// ══════════════════════════════════════════
function savePhoto(){
  const sc=document.getElementById('stripCanvas');
  const oc=document.getElementById('stickerOverlay');
  const m=document.createElement('canvas');
  m.width=sc.width; m.height=sc.height;
  const ctx=m.getContext('2d');
  ctx.drawImage(sc,0,0); ctx.drawImage(oc,0,0);
  const a=document.createElement('a');
  a.href=m.toDataURL('image/jpeg',0.95);
  a.download=`인생네컷_${Date.now()}.jpg`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('💾 저장됐어요! 📱');
}
function clearResult(){
  if(!confirm('결과를 지울까요? 촬영한 사진도 모두 삭제돼요.')) return;
  shots=[]; perPhotoFrames=[]; overlayItems=[];
  resultFilter='none';
  document.getElementById('rBr').value=1;
  document.getElementById('rBl').value=0;
  document.querySelectorAll('#resFilterChips .fchip').forEach((b,i)=>{
    b.classList.toggle('active',i===0);
  });
  const sc=document.getElementById('stripCanvas');
  const oc=document.getElementById('stickerOverlay');
  sc.getContext('2d').clearRect(0,0,sc.width,sc.height);
  oc.getContext('2d').clearRect(0,0,oc.width,oc.height);
  document.getElementById('photoFrameWrap').innerHTML='';
  buildDotRow();
  switchTab('cam');
  toast('🗑 결과가 삭제됐어요');
}

// ══════════════════════════════════════════
// GRID BUILDERS
// ══════════════════════════════════════════
function buildColorGrid(){
  const g=document.getElementById('colorGrid');
  // "없음" = camera only
  const none=document.createElement('div');
  none.className='sw active'; none.style.background='#1a1a2e';
  none.textContent='📷'; none.title='카메라만';
  none.onclick=()=>{setBg('none');setActiveSw(none);};
  g.appendChild(none);
  // solid colors
  ['#ff6b9d','#c77dff','#7bb7fa','#06d6a0','#ffd166','#ef476f',
   '#f8edeb','#e0fbfc','#fff9c4','#fce4ec','#1a1a2e','#2d6a4f'].forEach(c=>{
    const sw=document.createElement('div');
    sw.className='sw'; sw.style.background=c;
    sw.onclick=()=>{setBg('color',c);setActiveSw(sw);};
    g.appendChild(sw);
  });
}
function buildGradGrid(){
  const g=document.getElementById('gradGrid');
  GRADS.forEach(gr=>{
    const sw=document.createElement('div');
    sw.className='sw'; sw.style.background=gr;
    sw.onclick=()=>{setBg('grad',gr);setActiveSw(sw);};
    g.appendChild(sw);
  });
}
function buildPatGrid(){
  const g=document.getElementById('patGrid');
  PATS.forEach(p=>{
    const sw=document.createElement('div');
    sw.className='sw'; sw.style.background=p.b;
    sw.innerHTML=`<span style="font-size:0.6rem;color:#888;">${p.l}</span>`;
    sw.onclick=()=>{setBg('pat',p);setActiveSw(sw);};
    g.appendChild(sw);
  });
}
function buildFilterChips(id,isRes){
  const g=document.getElementById(id);
  FILTERS.forEach(f=>{
    const b=document.createElement('button');
    b.className='fchip'+(f.n==='없음'?' active':'');
    b.textContent=f.l;
    b.onclick=()=>{
      if(isRes){resultFilter=f.c;redrawStrip();}
      else{camFilter=f.c;applyVF();}
      g.querySelectorAll('.fchip').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    g.appendChild(b);
  });
}
function buildStickerGrid(){
  const g=document.getElementById('stickerGrid');
  STICKERS.forEach(e=>{
    const b=document.createElement('button');
    b.className='spick'; b.textContent=e;
    b.onclick=()=>addSticker(e);
    g.appendChild(b);
  });
}
function buildTxtColors(){
  const r=document.getElementById('txtColors');
  TCOLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cdot'+(c===txtColor?' active':'');
    d.style.background=c;
    if(c==='#ffffff') d.style.border='1.5px solid #ddd';
    d.onclick=()=>{txtColor=c;r.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));d.classList.add('active');};
    r.appendChild(d);
  });
}
function buildDotRow(){
  const r=document.getElementById('dotRow'); r.innerHTML='';
  for(let i=0;i<shotCount;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' cur':''); d.id='d'+i;
    r.appendChild(d);
  }
  updateLabel();
}

// ══════════════════════════════════════════
// SETTERS
// ══════════════════════════════════════════
function setShotCount(n,btn){
  shotCount=n; shots=[]; perPhotoFrames=[];
  document.querySelectorAll('.sshot').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); buildDotRow();
}
function setRatio(w,h,btn){
  rW=w; rH=h;
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); updateAspect();
}
function setTimer(t,btn){
  timerDelay=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setBg(type,val){
  bgType=type; bgVal=val||null;
}
function setActiveSw(el){
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
}
function applyVF(){
  const br=parseFloat(document.getElementById('brSlider').value);
  const bl=parseFloat(document.getElementById('blSlider').value);
  document.getElementById('brVal').textContent=br.toFixed(1);
  document.getElementById('blVal').textContent=bl.toFixed(1);
  let f=`brightness(${br})`;
  if(camFilter!=='none') f+=' '+camFilter;
  if(bl>0) f+=` blur(${bl}px)`;
  document.getElementById('videoEl').style.filter=f;
}
function loadBgImg(inp){
  const file=inp.files[0]; if(!file) return;
  const img=new Image();
  img.onload=()=>{bgImgObj=img;setBg('image');toast('🖼 배경 이미지 설정됨!');};
  img.src=URL.createObjectURL(file);
}
function switchBgTab(t,btn){
  document.querySelectorAll('.stab').forEach(x=>x.classList.remove('active'));
  const m={c:'bgC',g:'bgG',p:'bgP',u:'bgU'};
  document.getElementById(m[t]).classList.add('active');
  document.querySelectorAll('.bg-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(t==='c') setBg('none'); // 없음 탭으로 오면 초기화
}
function updateAspect(){
  const va=document.getElementById('viewArea');
  const bc=document.getElementById('bgCanvas');
  const w=va.offsetWidth;
  const h=Math.min(Math.round(w*rH/rW),Math.round(window.innerHeight*.52));
  va.style.height=h+'px';
  bc.width=w; bc.height=h;
}
function updateDots(){
  for(let i=0;i<shotCount;i++){
    const d=document.getElementById('d'+i); if(!d) continue;
    if(i<shots.length) d.className='dot taken';
    else if(i===shots.length) d.className='dot cur';
    else d.className='dot';
  }
}
function updateLabel(){document.getElementById('shotLabel').textContent=`${shots.length} / ${shotCount}`;}
function resetShots(){shots=[];perPhotoFrames=[];overlayItems=[];buildDotRow();switchTab('cam');}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function drawGrad(ctx,css,w,h){
  const cs=css.match(/#[0-9a-fA-F]{3,8}/g)||['#c77dff','#ff6b9d'];
  const g=ctx.createLinearGradient(0,0,w,h);
  cs.forEach((c,i)=>g.addColorStop(i/(cs.length-1),c));
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
}
function drawPat(ctx,p,w,h){
  ctx.save(); ctx.globalAlpha=0.3;
  const m={heart:'❤️',star:'⭐',dot:'⬤',check:'✓',flower:'🌸',cloud:'☁️',rainbow:'🌈',sky:'✈️'};
  const em=m[p]||'✨'; const sz=24;
  ctx.font=`${sz}px serif`; ctx.textAlign='center';
  for(let y=sz;y<h+sz;y+=sz*1.8)
    for(let x=(Math.floor(y/sz)%2===0?0:sz);x<w+sz;x+=sz*2) ctx.fillText(em,x,y);
  ctx.restore();
}

// ══════════════════════════════════════════
// TAB SWITCH
// ══════════════════════════════════════════
function switchTab(t){
  document.getElementById('tCam').classList.toggle('active',t==='cam');
  document.getElementById('tRes').classList.toggle('active',t==='res');
  document.getElementById('camTab').style.display=t==='cam'?'grid':'none';
  document.getElementById('resTab').style.display=t==='res'?'grid':'none';
  if(t==='res'){
    if(shots.length===0){switchTab('cam');toast('먼저 사진을 찍어주세요 📸');return;}
    buildStrip();
    buildPhotoFrameUI();
    setTimeout(()=>requestAnimationFrame(resizeOC),150);
    // resize draw canvas
    requestAnimationFrame(()=>{
      const dc=document.getElementById('drawCanvas');
      if(dc.offsetWidth>0){dc.width=dc.offsetWidth; dc.height=100;}
    });
  }
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.addEventListener('resize',updateAspect);
init();
</script>
