<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ 인생네컷 포토부스</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root{--pink:#ff6b9d;--purple:#c77dff;--mint:#06d6a0;--card:#fff;--text:#3d2b4e;--radius:20px;--shadow:0 8px 32px rgba(255,107,157,0.18);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#ffeef8 0%,#f0e6ff 50%,#e6f4ff 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px;color:var(--text);overflow-x:hidden;}
h1{font-family:'Nanum Pen Script',cursive;font-size:2.2rem;color:var(--pink);text-shadow:2px 2px 0 #ffe0ef;margin-bottom:2px;letter-spacing:2px;}
.subtitle{font-size:0.75rem;color:#b084c9;margin-bottom:12px;letter-spacing:1px;}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,255,255,0.6);border-radius:40px;padding:5px;box-shadow:0 2px 12px rgba(200,120,200,0.12);}
.tab-btn{border:none;background:none;padding:7px 18px;border-radius:30px;font-size:0.82rem;font-family:'Noto Sans KR';cursor:pointer;color:#b084c9;font-weight:600;transition:all .25s;}
.tab-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 3px 10px rgba(255,107,157,0.35);}
.cam-layout{width:100%;max-width:900px;display:grid;grid-template-columns:1fr 265px;gap:14px;align-items:start;}
@media(max-width:680px){.cam-layout{grid-template-columns:1fr;}.cam-side{order:-1;display:flex;flex-direction:row;gap:10px;overflow-x:auto;padding-bottom:4px;}.panel-card{min-width:200px;}}
.camera-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.view-area{position:relative;background:#111;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1;}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2;pointer-events:none;}
#handCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;display:none;}
#countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:'Nanum Pen Script',cursive;font-size:9rem;color:white;text-shadow:0 0 40px rgba(255,107,157,.9),3px 5px 0 rgba(0,0,0,.3);z-index:15;pointer-events:none;background:rgba(0,0,0,.15);}
.flash{position:absolute;inset:0;background:white;opacity:0;z-index:20;pointer-events:none;transition:opacity .08s;}
.palm-status{padding:7px 14px;display:flex;align-items:center;gap:8px;background:#fdf9ff;border-top:1px solid #f5eeff;font-size:0.75rem;}
.sdot{width:9px;height:9px;border-radius:50%;background:#e0d0f0;transition:all .3s;flex-shrink:0;}
.sdot.on{background:var(--pink);box-shadow:0 0 7px rgba(255,107,157,.5);}
.sdot.ready{background:var(--mint);box-shadow:0 0 7px rgba(6,214,160,.5);}
.shot-progress{padding:7px 14px;display:flex;align-items:center;gap:5px;background:#fdf9ff;border-top:1px solid #f5eeff;}
.dot{width:9px;height:9px;border-radius:50%;background:#e6d5f5;transition:all .3s;flex-shrink:0;}
.dot.taken{background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 2px 6px rgba(200,100,200,.4);}
.dot.cur{background:#ffd0e8;box-shadow:0 0 0 3px rgba(255,107,157,.3);}
.shot-label{font-size:0.72rem;color:#b084c9;font-weight:600;margin-left:auto;}
.cam-controls{padding:11px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.btn{border:none;border-radius:30px;padding:8px 18px;cursor:pointer;font-family:'Noto Sans KR';font-size:0.8rem;font-weight:700;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 4px 14px rgba(255,107,157,.4);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-secondary{background:#f5f0ff;color:var(--purple);border:1.5px solid #e0cfff;}
.btn-danger{background:#fff0f3;color:#e05c7a;border:1.5px solid #ffd0dc;}
.btn-sm{padding:6px 13px;font-size:0.74rem;}
.timer-row{display:flex;gap:4px;margin-left:auto;}
.tbtn{border:1.5px solid #e0cfff;background:#f5f0ff;color:var(--purple);border-radius:20px;padding:5px 10px;font-size:0.73rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.tbtn.active{background:var(--purple);color:white;border-color:var(--purple);}
.hand-guide{padding:8px 14px;background:#fff8ff;border-top:1px solid #f5eeff;font-size:0.73rem;color:#b084c9;line-height:1.6;}
.hand-guide strong{color:var(--pink);}
.panel-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px;}
.panel-title{font-size:0.73rem;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;}
.cam-side{display:flex;flex-direction:column;gap:11px;}
.ratio-grid{display:flex;gap:6px;flex-wrap:wrap;}
.ratio-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid #f0e6ff;border-radius:10px;padding:6px 8px;background:#faf5ff;cursor:pointer;transition:all .2s;font-size:0.67rem;color:#9a7ab8;}
.ratio-icon{background:#e6d5ff;border-radius:3px;}
.ratio-btn.active{border-color:var(--purple);background:#f0e6ff;color:var(--purple);font-weight:700;}
.shot-picker{display:flex;gap:5px;flex-wrap:wrap;}
.sshot{border:2px solid #f0e6ff;border-radius:10px;padding:5px 11px;background:#faf5ff;cursor:pointer;font-size:0.78rem;color:#9a7ab8;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.sshot.active{border-color:var(--pink);background:#fff0f6;color:var(--pink);}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;background:linear-gradient(to right,var(--pink),var(--purple));border-radius:10px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:white;border:2.5px solid var(--pink);box-shadow:0 2px 5px rgba(255,107,157,.3);}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sval{font-size:0.75rem;color:var(--pink);font-weight:700;min-width:24px;text-align:right;}
.sl{font-size:0.68rem;color:#ccc;}
.bg-tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;}
.bg-tab{border:none;background:#f5f0ff;color:#b084c9;padding:4px 8px;border-radius:15px;font-size:0.68rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.bg-tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;}
.bg-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.sw{border-radius:5px;aspect-ratio:1;cursor:pointer;border:2.5px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:0.75rem;}
.sw.active{border-color:var(--pink);}
.sw:hover{transform:scale(1.1);}
.stab{display:none;}.stab.active{display:block;}
.fchips{display:flex;flex-wrap:wrap;gap:4px;}
.fchip{border:1.5px solid #f0e6ff;border-radius:15px;padding:4px 9px;background:#faf5ff;cursor:pointer;font-size:0.67rem;color:#9a7ab8;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.fchip.active{border-color:var(--purple);background:#f0e6ff;color:var(--purple);font-weight:700;}
.upload-area{border:2px dashed #e0cfff;border-radius:10px;padding:12px;text-align:center;cursor:pointer;color:#b084c9;font-size:0.73rem;transition:all .2s;background:#fdf9ff;}
.upload-area:hover{border-color:var(--pink);background:#fff0f9;}
#bgUpload{display:none;}
.result-layout{width:100%;max-width:900px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;}
@media(max-width:680px){.result-layout{grid-template-columns:1fr;}#stripWrap{display:flex;justify-content:center;flex-direction:column;align-items:center;}}
#stripCanvas{border-radius:12px;box-shadow:0 8px 30px rgba(200,100,200,.25);max-width:320px;width:100%;display:block;}
#stickerOverlay{position:absolute;top:0;left:0;cursor:crosshair;}
#rslayer{position:relative;display:inline-block;}
.strip-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
.result-side{display:flex;flex-direction:column;gap:11px;}
.frame-tab-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.ftab{border:none;background:#f5f0ff;color:#b084c9;padding:4px 8px;border-radius:15px;font-size:0.68rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:600;transition:all .2s;}
.ftab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;}
.frame-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.fbtn{border:2px solid #f0e6ff;border-radius:10px;padding:6px 3px;background:#faf5ff;cursor:pointer;font-size:0.66rem;color:#9a7ab8;transition:all .2s;text-align:center;font-family:'Noto Sans KR';}
.fbtn.active{border-color:var(--pink);background:#fff0f6;color:var(--pink);font-weight:700;}
.ficon{font-size:1.2rem;display:block;margin-bottom:2px;}
.sticker-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:110px;overflow-y:auto;}
.spick{font-size:1.4rem;cursor:pointer;padding:3px;border-radius:7px;transition:transform .2s;background:#faf5ff;border:1.5px solid #f0e6ff;}
.spick:hover{transform:scale(1.25);background:#ffe0f0;}
.text-row{display:flex;gap:5px;align-items:center;margin-bottom:6px;}
.text-row input{flex:1;border:1.5px solid #e0cfff;border-radius:10px;padding:6px 9px;font-family:'Noto Sans KR';font-size:0.78rem;outline:none;color:var(--text);background:#fdf9ff;}
.text-row input:focus{border-color:var(--pink);}
.crow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.cdot{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.cdot.active{border-color:var(--text);transform:scale(1.2);}
#hwCanvas{border:2px solid #e0cfff;border-radius:10px;cursor:crosshair;touch-action:none;background:white;display:block;width:100%;}
.hw-controls{display:flex;gap:5px;align-items:center;margin-top:5px;flex-wrap:wrap;}
.hw-color{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;}
.hw-color.active{border-color:#333;transform:scale(1.15);}
.hw-sz{border:1.5px solid #e0cfff;border-radius:8px;padding:3px 7px;cursor:pointer;font-size:0.68rem;background:#faf5ff;color:#9a7ab8;font-family:'Noto Sans KR';}
.hw-sz.active{background:var(--purple);color:white;border-color:var(--purple);}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:linear-gradient(135deg,var(--pink),var(--purple));color:white;padding:8px 20px;border-radius:30px;font-size:0.8rem;font-weight:700;box-shadow:0 6px 24px rgba(200,100,200,.4);opacity:0;transition:all .35s;z-index:1000;pointer-events:none;font-family:'Noto Sans KR';white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<h1>✨ 인생네컷 포토부스</h1>
<p class="subtitle">🤚 손바닥을 펼치면 자동 촬영 시작!</p>
<div class="tabs">
  <button class="tab-btn active" id="tCam" onclick="switchTab('cam')">📷 촬영</button>
  <button class="tab-btn" id="tRes" onclick="switchTab('res')">🎨 꾸미기 & 결과</button>
</div>

<!-- CAMERA TAB -->
<div id="camTab" class="cam-layout">
  <div class="camera-wrap">
    <div class="view-area" id="viewArea" style="height:360px;">
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="bgCanvas"></canvas>
      <canvas id="handCanvas"></canvas>
      <div id="countdown"></div>
      <div class="flash" id="flash"></div>
    </div>
    <div class="palm-status"><div class="sdot" id="sdot"></div><span id="stext">카메라 연결 중...</span></div>
    <div class="shot-progress">
      <span style="font-size:0.72rem;color:#b084c9;font-weight:600;">촬영</span>
      <div id="dotRow" style="display:flex;gap:5px;margin-left:8px;align-items:center;"></div>
      <span class="shot-label" id="shotLabel">0 / 4</span>
    </div>
    <div class="cam-controls">
      <button class="btn btn-primary btn-sm" onclick="manualCapture()">📸 직접 찍기</button>
      <button class="btn btn-secondary btn-sm" onclick="resetShots()">🔄 다시</button>
      <button class="btn btn-secondary btn-sm" onclick="flipCam()">🔀 반전</button>
      <div class="timer-row">
        <button class="tbtn" onclick="setTimer(0,this)">즉시</button>
        <button class="tbtn active" onclick="setTimer(3,this)">3초</button>
        <button class="tbtn" onclick="setTimer(5,this)">5초</button>
        <button class="tbtn" onclick="setTimer(10,this)">10초</button>
      </div>
    </div>
    <div class="hand-guide">🤚 <strong>손바닥을 활짝 펼쳐</strong> 카메라에 보여주세요 → <strong>3초 카운트다운</strong> 후 자동 촬영!</div>
  </div>
  <div class="cam-side">
    <div class="panel-card">
      <div class="panel-title">📷 컷 수</div>
      <div class="shot-picker">
        <button class="sshot" onclick="setShotCount(1,this)">1컷</button>
        <button class="sshot" onclick="setShotCount(2,this)">2컷</button>
        <button class="sshot active" onclick="setShotCount(4,this)">4컷</button>
        <button class="sshot" onclick="setShotCount(6,this)">6컷</button>
        <button class="sshot" onclick="setShotCount(8,this)">8컷</button>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">📐 비율</div>
      <div class="ratio-grid">
        <button class="ratio-btn active" onclick="setRatio(3,4,this)"><div class="ratio-icon" style="width:20px;height:28px;"></div>3:4</button>
        <button class="ratio-btn" onclick="setRatio(1,1,this)"><div class="ratio-icon" style="width:24px;height:24px;"></div>1:1</button>
        <button class="ratio-btn" onclick="setRatio(9,16,this)"><div class="ratio-icon" style="width:15px;height:28px;"></div>9:16</button>
        <button class="ratio-btn" onclick="setRatio(4,3,this)"><div class="ratio-icon" style="width:28px;height:20px;"></div>4:3</button>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">🎨 배경 오버레이</div>
      <div class="bg-tabs">
        <button class="bg-tab active" onclick="switchBgTab('c',this)">컬러</button>
        <button class="bg-tab" onclick="switchBgTab('g',this)">그라데</button>
        <button class="bg-tab" onclick="switchBgTab('p',this)">패턴</button>
        <button class="bg-tab" onclick="switchBgTab('u',this)">내 사진</button>
      </div>
      <div id="bgC" class="stab active"><div class="bg-grid" id="colorGrid"></div></div>
      <div id="bgG" class="stab"><div class="bg-grid" id="gradGrid"></div></div>
      <div id="bgP" class="stab"><div class="bg-grid" id="patGrid"></div></div>
      <div id="bgU" class="stab">
        <div class="upload-area" onclick="document.getElementById('bgUpload').click()"><div style="font-size:1.5rem;margin-bottom:3px;">🖼</div>내 사진 불러오기</div>
        <input type="file" id="bgUpload" accept="image/*" onchange="loadBgImg(this)">
      </div>
      <div class="srow" style="margin-top:8px;">
        <span class="sl">투명</span>
        <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.2" oninput="updateBgOpacity()">
        <span class="sl">불투명</span>
        <span class="sval" id="bgOpacityVal">0.2</span>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-title">☀️ 밝기 & 흐림</div>
      <div class="srow"><span class="sl">어둡</span><input type="range" id="brSlider" min="0.3" max="2" step="0.05" value="1" oninput="applyVF()"><span class="sl">밝음</span><span class="sval" id="brVal">1.0</span></div>
      <div class="srow"><span class="sl">선명</span><input type="range" id="blSlider" min="0" max="15" step="0.5" value="0" oninput="applyVF()"><span class="sl">흐림</span><span class="sval" id="blVal">0</span></div>
      <div class="panel-title" style="margin-top:8px;">🎞 필터</div>
      <div class="fchips" id="camFilterChips"></div>
    </div>
  </div>
</div>

<!-- RESULT TAB -->
<div id="resTab" style="display:none;" class="result-layout">
  <div id="stripWrap">
    <div id="rslayer"><canvas id="stripCanvas"></canvas><canvas id="stickerOverlay"></canvas></div>
    <div class="strip-actions">
      <button class="btn btn-primary btn-sm" onclick="savePhoto()">💾 저장</button>
      <button class="btn btn-secondary btn-sm" onclick="switchTab('cam')">📷 다시 찍기</button>
      <button class="btn btn-danger btn-sm" onclick="clearResult()">🗑 결과 지우기</button>
    </div>
    <p style="font-size:0.68rem;color:#c0a0d0;margin-top:5px;text-align:center;">저장 시 스티커·손글씨 모두 포함돼요 📱</p>
  </div>
  <div class="result-side">
    <div class="panel-card">
      <div class="panel-title">🖼 프레임</div>
      <div class="frame-grid" id="frameGrid"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">🎀 스티커</div>
      <div class="sticker-grid" id="stickerGrid"></div>
      <button class="btn btn-danger btn-sm" style="margin-top:7px;width:100%;" onclick="clearOverlay()">스티커 전체 삭제</button>
    </div>
    <div class="panel-card">
      <div class="panel-title">✏️ 텍스트</div>
      <div class="text-row"><input type="text" id="txtIn" placeholder="한 줄 메모..." maxlength="30"><button class="btn btn-primary btn-sm" onclick="addText()">추가</button></div>
      <div class="crow" id="txtColors"></div>
      <div style="font-size:0.68rem;color:#ccc;">색상 선택 후 추가 → 드래그로 위치 이동</div>
    </div>
    <div class="panel-card">
      <div class="panel-title">🖊 손글씨</div>
      <canvas id="hwCanvas" height="100"></canvas>
      <div class="hw-controls">
        <div id="hwColors" style="display:flex;gap:4px;"></div>
        <div id="hwSizes" style="display:flex;gap:3px;"></div>
        <button class="btn btn-secondary btn-sm" onclick="clearHW()">지우기</button>
        <button class="btn btn-primary btn-sm" onclick="addHWToStrip()">추가</button>
      </div>
      <div style="font-size:0.68rem;color:#ccc;margin-top:4px;">손글씨 쓰고 추가 버튼 → 스트립에 올라가요</div>
    </div>
    <div class="panel-card">
      <div class="panel-title">💎 후보정</div>
      <div class="srow"><span class="sl">어둡</span><input type="range" id="rBr" min="0.4" max="1.8" step="0.05" value="1" oninput="redrawStrip()"><span class="sl">밝음</span></div>
      <div class="srow"><span class="sl">선명</span><input type="range" id="rBl" min="0" max="8" step="0.5" value="0" oninput="redrawStrip()"><span class="sl">흐림</span></div>
      <div class="panel-title" style="margin-top:8px;">🎞 필터</div>
      <div class="fchips" id="resFilterChips"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
let stream=null,mpHands=null,mpCam=null;
let shotCount=4,shots=[],timerDelay=3,isMirrored=true;
let rW=3,rH=4;
let camFilter='none',resultFilter='none';
let bgType='none',bgVal=null,bgImg=null,bgOpacity=0.2;
let currentFrame='none';
let isCapturing=false,cdRunning=false,videoReady=false;
let palmHeld=false,palmHeldStart=0;
let overlayItems=[],dragging=null,dragOX=0,dragOY=0;
let txtColor='#ff6b9d';
let bgAnimFrame=null;

async function init(){
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
  }
  buildColorGrid();buildGradGrid();buildPatGrid();
  buildFilterChips('camFilterChips',false);buildFilterChips('resFilterChips',true);
  buildStickerGrid();buildTxtColors();buildDotRow();updateAspect();
  document.getElementById('brVal').textContent='1.0';
  document.getElementById('blVal').textContent='0';
  document.getElementById('bgOpacityVal').textContent='0.2';
  await startCam();initMediaPipe();initOverlay();initHW();
}

async function startCam(){
  try{
    // 크롬/엣지 호환: 제약 단순화, 이벤트 먼저 등록
    const constraints={
      video:{width:{ideal:1280},height:{ideal:720},facingMode:{ideal:'user'}},
      audio:false
    };
    stream=await navigator.mediaDevices.getUserMedia(constraints);
    const v=document.getElementById('videoEl');
    // 이벤트 먼저 등록 후 srcObject 설정
    v.onloadedmetadata=()=>{
      v.play().catch(()=>{});
    };
    v.oncanplay=()=>{
      videoReady=true;
      setStat('on','🤚 손바닥을 카메라에 보여주세요!');
      startBgLoop();
    };
    v.srcObject=stream;
    v.style.transform='scaleX(-1)';
    toast('📷 카메라 연결됨!');
  }catch(e){
    // facingMode 없이 재시도
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      const v=document.getElementById('videoEl');
      v.onloadedmetadata=()=>{v.play().catch(()=>{});};
      v.oncanplay=()=>{videoReady=true;setStat('on','🤚 손바닥을 카메라에 보여주세요!');startBgLoop();};
      v.srcObject=stream;
      v.style.transform='scaleX(-1)';
      toast('📷 카메라 연결됨!');
    }catch(e2){
      setStat('','⚠️ 카메라 권한을 허용해주세요');
      toast('카메라 접근 권한이 필요해요');
    }
  }
}

function startBgLoop(){
  if(bgAnimFrame)cancelAnimationFrame(bgAnimFrame);
  function loop(){drawBgCanvas();bgAnimFrame=requestAnimationFrame(loop);}
  bgAnimFrame=requestAnimationFrame(loop);
}
function drawBgCanvas(){
  const va=document.getElementById('viewArea');
  const bc=document.getElementById('bgCanvas');
  const w=va.offsetWidth,h=va.offsetHeight;
  if(!w||!h)return;
  bc.width=w;bc.height=h;
  const ctx=bc.getContext('2d');
  ctx.clearRect(0,0,w,h);
  if(bgType==='none')return;
  ctx.globalAlpha=bgOpacity;
  if(bgType==='color'){ctx.fillStyle=bgVal;ctx.fillRect(0,0,w,h);}
  else if(bgType==='grad'){drawGrad(ctx,bgVal,w,h);}
  else if(bgType==='pat'){ctx.fillStyle=bgVal.b;ctx.fillRect(0,0,w,h);ctx.globalAlpha=bgOpacity*0.4;drawPat(ctx,bgVal.p,w,h);}
  else if(bgType==='image'&&bgImg){const s=Math.max(w/bgImg.width,h/bgImg.height);ctx.drawImage(bgImg,(w-bgImg.width*s)/2,(h-bgImg.height*s)/2,bgImg.width*s,bgImg.height*s);}
  ctx.globalAlpha=1;
}
function updateBgOpacity(){bgOpacity=parseFloat(document.getElementById('bgOpacity').value);document.getElementById('bgOpacityVal').textContent=bgOpacity.toFixed(2);}

function initMediaPipe(){
  // MediaPipe 로드 상태 확인 후 재시도
  let retries=0;
  function tryInit(){
    if(typeof Hands!=='undefined' && typeof Camera!=='undefined'){
      startMediaPipe();
    } else if(retries<20){
      retries++;
      setTimeout(tryInit,500);
    } else {
      // MediaPipe 완전 실패 → TF.js 폴백
      setStat('on','🤚 손바닥을 카메라에 보여주세요!');
      startTFJSDetection();
    }
  }
  tryInit();
}

function startMediaPipe(){
  try{
    mpHands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    mpHands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    mpHands.onResults(onHandResults);
    const v=document.getElementById('videoEl');
    mpCam=new Camera(v,{
      onFrame:async()=>{
        if(videoReady&&mpHands){
          try{ await mpHands.send({image:v}); }catch(e){}
        }
      },
      width:640,height:480
    });
    mpCam.start();
    setStat('on','🤚 손바닥을 카메라에 보여주세요!');
  }catch(e){
    startTFJSDetection();
  }
}

// TF.js handpose 폴백
let tfModel=null, tfLoop=null;
async function startTFJSDetection(){
  try{
    // 동적으로 TF.js 로드
    if(typeof tf==='undefined'){
      await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js');
    }
    if(typeof handPoseDetection==='undefined'){
      await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js');
    }
    const model=handPoseDetection.SupportedModels.MediaPipeHands;
    tfModel=await handPoseDetection.createDetector(model,{
      runtime:'tfjs',
      modelType:'lite',
      maxHands:1
    });
    setStat('on','🤚 손바닥을 카메라에 보여주세요!');
    runTFDetection();
  }catch(e){
    // TF도 실패 → 직접 찍기만 사용
    setStat('on','손 인식 불가 — 직접 찍기 버튼을 사용하세요');
  }
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function runTFDetection(){
  const v=document.getElementById('videoEl');
  async function detect(){
    if(!tfModel||!videoReady||cdRunning||isCapturing){
      tfLoop=requestAnimationFrame(detect); return;
    }
    try{
      const hands=await tfModel.estimateHands(v);
      if(hands&&hands.length>0){
        const kp=hands[0].keypoints;
        // keypoints를 MediaPipe 형식으로 변환
        const lm=kp.map(k=>({x:k.x/v.videoWidth, y:k.y/v.videoHeight}));
        if(isPalmOpen(lm)){
          if(!palmHeld){palmHeld=true;palmHeldStart=Date.now();setStat('ready','✅ 손바닥 감지! 유지하세요...');}
          else if(Date.now()-palmHeldStart>600){palmHeld=false;startCapture();}
        }else{palmHeld=false;if(!cdRunning)setStat('on','🤚 손바닥을 활짝 펴주세요!');}
      }else{
        palmHeld=false;
        if(!cdRunning&&!isCapturing)setStat('on','🤚 손바닥을 카메라에 보여주세요!');
      }
    }catch(e){}
    tfLoop=requestAnimationFrame(detect);
  }
  detect();
}
function isPalmOpen(lm){const tips=[8,12,16,20],mcps=[5,9,13,17];let o=0;for(let i=0;i<4;i++)if(lm[tips[i]].y<lm[mcps[i]].y)o++;return o>=3&&Math.abs(lm[4].x-lm[2].x)>0.05;}
function onHandResults(res){
  if(cdRunning||isCapturing)return;
  if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
    const lm=res.multiHandLandmarks[0];
    if(isPalmOpen(lm)){
      if(!palmHeld){palmHeld=true;palmHeldStart=Date.now();setStat('ready','✅ 손바닥 감지! 유지하세요...');}
      else if(Date.now()-palmHeldStart>600){palmHeld=false;startCapture();}
    }else{palmHeld=false;if(!cdRunning)setStat('on','🤚 손바닥을 활짝 펴주세요!');}
  }else{palmHeld=false;if(!cdRunning&&!isCapturing)setStat('on','🤚 손바닥을 카메라에 보여주세요!');}
}

function manualCapture(){startCapture();}
function startCapture(){
  if(isCapturing||cdRunning)return;
  if(shots.length>=shotCount){toast('다 찍었어요! 🔄 다시 버튼 누르세요');return;}
  if(!videoReady){toast('카메라 준비 중...');return;}
  if(timerDelay>0){cdRunning=true;setStat('ready',`⏱ ${timerDelay}초 후 촬영!`);runCD(timerDelay,()=>{cdRunning=false;doCapture();});}
  else doCapture();
}
function runCD(n,cb){
  const el=document.getElementById('countdown');el.style.display='flex';el.textContent=n;
  if(n<=0){el.style.display='none';cb();return;}
  setTimeout(()=>runCD(n-1,cb),1000);
}
function doCapture(){
  isCapturing=true;
  const fl=document.getElementById('flash');fl.style.opacity='0.95';setTimeout(()=>fl.style.opacity='0',100);
  const va=document.getElementById('viewArea'),video=document.getElementById('videoEl');
  const vw=va.offsetWidth,vh=va.offsetHeight;
  const off=document.createElement('canvas');
  const dpr=Math.min(window.devicePixelRatio,2);
  off.width=vw*dpr;off.height=vh*dpr;
  const ctx=off.getContext('2d');ctx.scale(dpr,dpr);
  ctx.save();
  if(isMirrored){ctx.translate(vw,0);ctx.scale(-1,1);}
  const br=parseFloat(document.getElementById('brSlider').value);
  const bl=parseFloat(document.getElementById('blSlider').value);
  let f=`brightness(${br})`;if(camFilter!=='none')f+=' '+camFilter;if(bl>0)f+=` blur(${bl}px)`;
  ctx.filter=f;ctx.drawImage(video,0,0,vw,vh);ctx.restore();ctx.filter='none';
  if(bgType!=='none'){
    ctx.globalAlpha=bgOpacity;
    if(bgType==='color'){ctx.fillStyle=bgVal;ctx.fillRect(0,0,vw,vh);}
    else if(bgType==='grad')drawGrad(ctx,bgVal,vw,vh);
    else if(bgType==='pat'){ctx.fillStyle=bgVal.b;ctx.fillRect(0,0,vw,vh);}
    else if(bgType==='image'&&bgImg){const s=Math.max(vw/bgImg.width,vh/bgImg.height);ctx.drawImage(bgImg,(vw-bgImg.width*s)/2,(vh-bgImg.height*s)/2,bgImg.width*s,bgImg.height*s);}
    ctx.globalAlpha=1;
  }
  shots.push(off);
  updateDots();updateLabel();isCapturing=false;
  if(shots.length>=shotCount){setTimeout(()=>{buildStrip();switchTab('res');},300);toast('🎉 모든 컷 촬영 완료!');}
  else{toast(`📸 ${shots.length}/${shotCount} 촬영 완료!`);setStat('on','🤚 손바닥을 보여주면 다음 컷!');}
}

const FW=290;
function buildStrip(){
  const sc=document.getElementById('stripCanvas');
  const gap=8,pad=16;
  const cols=shotCount>=6?2:1,rows=Math.ceil(shotCount/cols);
  const fw=cols===2?Math.floor(FW/2)-gap/2:FW,fh=Math.round(fw*rH/rW);
  const sw=cols*fw+(cols-1)*gap+pad*2,sh=rows*fh+(rows-1)*gap+pad*2+42;
  sc.width=sw;sc.height=sh;sc.style.width=Math.min(sw,320)+'px';sc.style.height='auto';
  const ctx=sc.getContext('2d');
  // strip background color based on frame
  const stripBgMap={
    none:'#fff', white:'#f0f0f0', black:'#111', pink:'#ffe0f0',
    polaroid:'#f8f8f8', film:'#f0f0f0', star:'#fff9d6',
    flower:'#ffe8f4', rainbow:'#fff',
    mint:'#e0f7f4', gold:'#fdf6e3', heart:'#fff0f4'
  };
  ctx.fillStyle=stripBgMap[currentFrame]||'#fff';
  ctx.fillRect(0,0,sw,sh);
  const rb=parseFloat(document.getElementById('rBr').value);
  const rbl=parseFloat(document.getElementById('rBl').value);
  const rf=resultFilter;
  shots.forEach((shot,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const x=pad+col*(fw+gap),y=pad+row*(fh+gap);
    const fid=currentFrame;
    drawSingleFrameBg(ctx,x,y,fw,fh,fid);
    const inset=getFrameInset(fid);
    ctx.save();ctx.beginPath();ctx.roundRect(x+inset,y+inset,fw-inset*2,fh-inset*2,4);ctx.clip();
    let f=`brightness(${rb})`;if(rf!=='none')f+=' '+rf;if(rbl>0)f+=` blur(${rbl}px)`;
    ctx.filter=f;ctx.drawImage(shot,x+inset,y+inset,fw-inset*2,fh-inset*2);
    ctx.restore();ctx.filter='none';
    drawSingleFrameOverlay(ctx,x,y,fw,fh,fid);
  });
  const now=new Date();
  const ds=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  ctx.fillStyle='#c77dff';ctx.font='700 11px "Noto Sans KR",sans-serif';ctx.textAlign='center';
  ctx.fillText('✨ '+ds+' ✨',sw/2,sh-13);
  buildFrameGrid();resizeOC();
}
function getFrameInset(fid){
  return fid==='film'?18:0;
}

function drawSingleFrameBg(ctx,x,y,w,h,fid){
  const bgMap={
    none:null, white:'#f0f0f0', black:'#111', pink:'#ffd6e8',
    polaroid:'#f5f5f5', film:'#fff',
    star:'#fff8cc', flower:'#ffe0f0', rainbow:'#fff',
    mint:'#c8f0ea', gold:'#f5e6a0', heart:'#ffd6e0'
  };
  const bg=bgMap[fid];
  if(bg){ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);}

  if(fid==='film'){
    // 양쪽 흰색 필름 스트립 영역
    const stripW=18;
    ctx.fillStyle='#fafafa';
    ctx.fillRect(x,y,stripW,h);
    ctx.fillRect(x+w-stripW,y,stripW,h);
    // 필름 구멍 (옅은 회색)
    ctx.fillStyle='#d5d5d5';
    for(let i=0;i<9;i++){
      const hy=y+8+i*(h-16)/8;
      ctx.beginPath();ctx.roundRect(x+3,hy,12,9,2);ctx.fill();
      ctx.beginPath();ctx.roundRect(x+w-15,hy,12,9,2);ctx.fill();
    }
    // 구멍 테두리
    ctx.strokeStyle='#bbb';
    ctx.lineWidth=1;
    for(let i=0;i<9;i++){
      const hy=y+8+i*(h-16)/8;
      ctx.beginPath();ctx.roundRect(x+3,hy,12,9,2);ctx.stroke();
      ctx.beginPath();ctx.roundRect(x+w-15,hy,12,9,2);ctx.stroke();
    }
  }
}

function drawSingleFrameOverlay(ctx,x,y,w,h,fid){
  if(fid==='none') return;
  const borderMap={
    white:  {color:'#c8c8c8', lw:10},
    black:  {color:'#111',    lw:10},
    pink:   {color:'#ff6b9d', lw:10},
    polaroid:{color:'#d0d0d0',lw:8},
    film:   {color:null,      lw:0},
    star:   {color:'#f5c400', lw:10},
    flower: {color:'#ff6baa', lw:10},
    rainbow:{color:null,      lw:0},
    mint:   {color:'#00b09b', lw:10},
    gold:   {color:'#c8960c', lw:10},
    heart:  {color:'#ff4d79', lw:10},
  };
  const b=borderMap[fid];
  if(b&&b.color){
    ctx.strokeStyle=b.color;
    ctx.lineWidth=b.lw;
    ctx.strokeRect(x+b.lw/2,y+b.lw/2,w-b.lw,h-b.lw);
  }
  if(fid==='rainbow'){
    ['#ff6b9d','#ffd166','#06d6a0','#4facfe','#c77dff'].forEach((col,i)=>{
      ctx.fillStyle=col;
      ctx.fillRect(x+i*(w/5),y,w/5,8);
      ctx.fillRect(x+i*(w/5),y+h-8,w/5,8);
    });
  }
  if(fid==='star'){
    ctx.font='13px serif';ctx.textAlign='left';
    for(let px=x+12;px<x+w-16;px+=22){ctx.fillText('⭐',px,y+16);ctx.fillText('⭐',px,y+h-3);}
  }
  if(fid==='flower'){
    ctx.font='13px serif';ctx.textAlign='left';
    for(let px=x+12;px<x+w-16;px+=20){ctx.fillText('🌸',px,y+16);ctx.fillText('🌸',px,y+h-3);}
  }
  if(fid==='heart'){
    ctx.font='13px serif';ctx.textAlign='left';
    for(let px=x+12;px<x+w-16;px+=20){ctx.fillText('❤️',px,y+16);ctx.fillText('❤️',px,y+h-3);}
  }
  if(fid==='gold'){
    ctx.font='13px serif';ctx.textAlign='left';
    for(let px=x+12;px<x+w-16;px+=22){ctx.fillText('✨',px,y+16);ctx.fillText('✨',px,y+h-3);}
  }
  if(fid==='polaroid'){
    ctx.fillStyle='#fff';
    ctx.fillRect(x,y+h-28,w,28);
  }
  if(fid==='film'){
    // 필름 스트립 중앙에 얇은 구분선 (위아래)
    ctx.strokeStyle='#e0e0e0';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+18,y);ctx.lineTo(x+18,y+h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+w-18,y);ctx.lineTo(x+w-18,y+h);ctx.stroke();
  }
}
function redrawStrip(){if(shots.length>0)buildStrip();}

function buildFrameGrid(){
  const g=document.getElementById('frameGrid');g.innerHTML='';
  FRAMES.forEach(f=>{
    const b=document.createElement('button');
    b.className='fbtn'+(f.id===currentFrame?' active':'');
    b.innerHTML=`<span class="ficon">${f.i}</span>${f.l}`;
    b.onclick=()=>{
      currentFrame=f.id;
      g.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
      redrawStrip();
    };
    g.appendChild(b);
  });
}

function initOverlay(){
  const oc=document.getElementById('stickerOverlay');
  oc.addEventListener('mousedown',ocDown);
  oc.addEventListener('touchstart',ocTS,{passive:false});
  // mousemove/touchmove on document so drag works outside canvas bounds
  document.addEventListener('mousemove',ocMove);
  document.addEventListener('touchmove',ocTM,{passive:false});
  document.addEventListener('mouseup',()=>dragging=null);
  document.addEventListener('touchend',()=>dragging=null);
}
function resizeOC(){
  const sc=document.getElementById('stripCanvas'),oc=document.getElementById('stickerOverlay');
  oc.width=sc.width;oc.height=sc.height;
  requestAnimationFrame(()=>{const r=sc.getBoundingClientRect();oc.style.width=r.width+'px';oc.style.height=r.height+'px';renderOC();});
}
function renderOC(){
  const oc=document.getElementById('stickerOverlay'),ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  overlayItems.forEach(it=>{
    if(it.type==='sticker'){ctx.font=`${it.fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(it.e,it.x,it.y);}
    else if(it.type==='text'){ctx.font=`700 ${it.fs}px "Noto Sans KR",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=3;ctx.strokeText(it.t,it.x,it.y);ctx.fillStyle=it.c;ctx.fillText(it.t,it.x,it.y);}
    else if(it.type==='hw'){ctx.drawImage(it.img,it.x,it.y,it.w,it.h);}
  });
}
function ocPos(e){const oc=document.getElementById('stickerOverlay'),r=oc.getBoundingClientRect();return{x:(e.clientX-r.left)*oc.width/r.width,y:(e.clientY-r.top)*oc.height/r.height};}
function ocTP(e){const t=e.touches[0];return ocPos({clientX:t.clientX,clientY:t.clientY});}
function hitTest(p){
  for(let i=overlayItems.length-1;i>=0;i--){
    const it=overlayItems[i];
    if(it.type==='hw'){
      // hw: top-left based, check bounding box
      if(p.x>=it.x && p.x<=it.x+it.w && p.y>=it.y && p.y<=it.y+it.h) return i;
    } else {
      // sticker/text: center based
      const r=Math.max((it.fs||40)*1.0, 30);
      if(Math.abs(p.x-it.x)<r && Math.abs(p.y-it.y)<r) return i;
    }
  }
  return -1;
}
function ocDown(e){
  const p=ocPos(e), idx=hitTest(p);
  if(idx>=0){
    dragging=idx;
    dragOX=p.x-overlayItems[idx].x;
    dragOY=p.y-overlayItems[idx].y;
    e.preventDefault();
  }
}
function ocTS(e){
  const p=ocTP(e), idx=hitTest(p);
  if(idx>=0){
    dragging=idx;
    dragOX=p.x-overlayItems[idx].x;
    dragOY=p.y-overlayItems[idx].y;
    e.preventDefault();
  }
}
function ocMove(e){
  if(dragging===null) return;
  const p=ocPos(e);
  overlayItems[dragging].x=p.x-dragOX;
  overlayItems[dragging].y=p.y-dragOY;
  renderOC();
}
function ocTM(e){
  if(dragging===null) return;
  e.preventDefault();
  const p=ocTP(e);
  overlayItems[dragging].x=p.x-dragOX;
  overlayItems[dragging].y=p.y-dragOY;
  renderOC();
}
function addSticker(e){const oc=document.getElementById('stickerOverlay');if(!oc.width)return;overlayItems.push({type:'sticker',e,x:oc.width*(0.2+Math.random()*0.6),y:oc.height*(0.15+Math.random()*0.7),fs:38+Math.random()*18});renderOC();}
function addText(){const val=document.getElementById('txtIn').value.trim();if(!val)return;const oc=document.getElementById('stickerOverlay');if(!oc.width)return;overlayItems.push({type:'text',t:val,x:oc.width/2,y:oc.height*(0.15+Math.random()*0.7),fs:22,c:txtColor});document.getElementById('txtIn').value='';renderOC();toast('✏️ 추가됨! 드래그로 위치 이동');}
function clearOverlay(){overlayItems=[];renderOC();}
function clearResult(){
  if(!confirm('결과를 지울까요? 촬영한 사진도 모두 삭제돼요.'))return;
  shots=[];overlayItems=[];
  const sc=document.getElementById('stripCanvas'),oc=document.getElementById('stickerOverlay');
  sc.getContext('2d').clearRect(0,0,sc.width,sc.height);
  oc.getContext('2d').clearRect(0,0,oc.width,oc.height);
  buildDotRow();switchTab('cam');toast('🗑 결과가 삭제됐어요');
}

function initHW(){
  const hc=document.getElementById('hwCanvas');
  requestAnimationFrame(()=>{hc.width=hc.offsetWidth||240;hc.height=100;clearHW();});
  hc.addEventListener('mousedown',hwStart);hc.addEventListener('mousemove',hwMove);
  hc.addEventListener('mouseup',hwEnd);hc.addEventListener('mouseleave',hwEnd);
  hc.addEventListener('touchstart',hwTS,{passive:false});hc.addEventListener('touchmove',hwTM,{passive:false});hc.addEventListener('touchend',hwEnd);
  buildHWColors();buildHWSizes();
}
function hwCP(e){const hc=document.getElementById('hwCanvas'),r=hc.getBoundingClientRect();return{x:(e.clientX-r.left)*hc.width/r.width,y:(e.clientY-r.top)*hc.height/r.height};}
function hwStart(e){hwDrawing=true;const p=hwCP(e);hwLastX=p.x;hwLastY=p.y;}
function hwMove(e){
  if(!hwDrawing)return;
  const hc=document.getElementById('hwCanvas'),ctx=hc.getContext('2d'),p=hwCP(e);
  ctx.beginPath();ctx.moveTo(hwLastX,hwLastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=hwColor;ctx.lineWidth=hwSize;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  hwLastX=p.x;hwLastY=p.y;
}
function hwEnd(){hwDrawing=false;}
function hwTS(e){e.preventDefault();const t=e.touches[0];hwStart({clientX:t.clientX,clientY:t.clientY});}
function hwTM(e){e.preventDefault();const t=e.touches[0];hwMove({clientX:t.clientX,clientY:t.clientY});}
function clearHW(){const hc=document.getElementById('hwCanvas');hc.getContext('2d').clearRect(0,0,hc.width,hc.height);}
function addHWToStrip(){
  const hc=document.getElementById('hwCanvas');
  const sc=document.getElementById('stripCanvas');
  const oc=document.getElementById('stickerOverlay');
  // use stripCanvas size if overlay not yet sized
  const canW=oc.width||sc.width||300;
  const canH=oc.height||sc.height||400;
  if(!canW||!canH){toast('먼저 사진을 찍어주세요!');return;}
  const dataUrl=hc.toDataURL();
  if(dataUrl==='data:,'){toast('손글씨를 먼저 써주세요!');return;}
  const img=new Image();
  img.onload=()=>{
    const hw=canW*0.8;
    const hh=hw*(hc.height/Math.max(hc.width,1));
    overlayItems.push({
      type:'hw', img,
      x: canW*0.1,
      y: canH*0.1,
      w: hw,
      h: hh,
      fs: 50 // used for hit radius approximation
    });
    // make sure overlay is properly sized before rendering
    if(oc.width!==sc.width||oc.height!==sc.height){
      oc.width=sc.width; oc.height=sc.height;
      requestAnimationFrame(()=>{
        const r=sc.getBoundingClientRect();
        oc.style.width=r.width+'px'; oc.style.height=r.height+'px';
        renderOC();
      });
    } else {
      renderOC();
    }
    clearHW();
    toast('🖊 손글씨 추가됨! 드래그로 위치 이동');
  };
  img.src=dataUrl;
}
function buildHWColors(){
  const row=document.getElementById('hwColors');
  HWCOLORS.forEach(c=>{const d=document.createElement('div');d.className='hw-color'+(c===hwColor?' active':'');d.style.background=c;d.onclick=()=>{hwColor=c;row.querySelectorAll('.hw-color').forEach(x=>x.classList.remove('active'));d.classList.add('active');};row.appendChild(d);});
}
function buildHWSizes(){
  const row=document.getElementById('hwSizes');
  [2,4,8,14].forEach(s=>{const b=document.createElement('button');b.className='hw-sz'+(s===hwSize?' active':'');b.textContent=s+'px';b.onclick=()=>{hwSize=s;row.querySelectorAll('.hw-sz').forEach(x=>x.classList.remove('active'));b.classList.add('active');};row.appendChild(b);});
}

function savePhoto(){
  const sc=document.getElementById('stripCanvas'),oc=document.getElementById('stickerOverlay');
  const m=document.createElement('canvas');m.width=sc.width;m.height=sc.height;
  const ctx=m.getContext('2d');ctx.drawImage(sc,0,0);ctx.drawImage(oc,0,0);
  const a=document.createElement('a');a.href=m.toDataURL('image/jpeg',0.95);a.download=`인생네컷_${Date.now()}.jpg`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);toast('💾 저장됐어요! 📱');
}

function buildColorGrid(){
  const g=document.getElementById('colorGrid');
  const cam=document.createElement('div');cam.className='sw active';cam.style.background='#1a1a2e';cam.textContent='📷';cam.style.fontSize='0.9rem';cam.title='배경 없음';
  cam.onclick=()=>{bgType='none';bgVal=null;setActiveSw(cam);};g.appendChild(cam);
  COLORS.forEach(c=>{const sw=document.createElement('div');sw.className='sw';sw.style.background=c;if(c==='#fff')sw.style.border='1.5px solid #eee';sw.onclick=()=>{bgType='color';bgVal=c;setActiveSw(sw);};g.appendChild(sw);});
}
function buildGradGrid(){const g=document.getElementById('gradGrid');GRADS.forEach(gr=>{const sw=document.createElement('div');sw.className='sw';sw.style.background=gr;sw.onclick=()=>{bgType='grad';bgVal=gr;setActiveSw(sw);};g.appendChild(sw);});}
function buildPatGrid(){const g=document.getElementById('patGrid');PATS.forEach(p=>{const sw=document.createElement('div');sw.className='sw';sw.style.background=p.b;sw.innerHTML=`<span style="font-size:0.55rem;color:#888;">${p.l}</span>`;sw.onclick=()=>{bgType='pat';bgVal=p;setActiveSw(sw);};g.appendChild(sw);});}
function buildFilterChips(id,isRes){const g=document.getElementById(id);FILTERS.forEach(f=>{const b=document.createElement('button');b.className='fchip'+(f.n==='없음'?' active':'');b.textContent=f.l;b.onclick=()=>{if(isRes){resultFilter=f.c;redrawStrip();}else{camFilter=f.c;applyVF();}g.querySelectorAll('.fchip').forEach(x=>x.classList.remove('active'));b.classList.add('active');};g.appendChild(b);});}
function buildStickerGrid(){const g=document.getElementById('stickerGrid');STICKERS.forEach(e=>{const b=document.createElement('button');b.className='spick';b.textContent=e;b.onclick=()=>addSticker(e);g.appendChild(b);});}
function buildTxtColors(){const r=document.getElementById('txtColors');TCOLORS.forEach(c=>{const d=document.createElement('div');d.className='cdot'+(c===txtColor?' active':'');d.style.background=c;if(c==='#ffffff')d.style.border='2px solid #ddd';d.onclick=()=>{txtColor=c;r.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));d.classList.add('active');};r.appendChild(d);});}
function buildDotRow(){const r=document.getElementById('dotRow');r.innerHTML='';for(let i=0;i<shotCount;i++){const d=document.createElement('div');d.className='dot'+(i===0?' cur':'');d.id='d'+i;r.appendChild(d);}updateLabel();}

function setShotCount(n,btn){shotCount=n;shots=[];document.querySelectorAll('.sshot').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildDotRow();}
function setRatio(w,h,btn){rW=w;rH=h;document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateAspect();}
function setTimer(t,btn){timerDelay=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setActiveSw(el){document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));el.classList.add('active');}
function applyVF(){
  const br=parseFloat(document.getElementById('brSlider').value);
  const bl=parseFloat(document.getElementById('blSlider').value);
  document.getElementById('brVal').textContent=br.toFixed(1);document.getElementById('blVal').textContent=bl.toFixed(1);
  let f=`brightness(${br})`;if(camFilter!=='none')f+=' '+camFilter;if(bl>0)f+=` blur(${bl}px)`;
  document.getElementById('videoEl').style.filter=f;
}
function loadBgImg(inp){const file=inp.files[0];if(!file)return;const img=new Image();img.onload=()=>{bgType='image';bgVal=img;bgImg=img;toast('🖼 배경 이미지 설정됨!');};img.src=URL.createObjectURL(file);}
function switchBgTab(t,btn){document.querySelectorAll('.stab').forEach(x=>x.classList.remove('active'));document.getElementById({c:'bgC',g:'bgG',p:'bgP',u:'bgU'}[t]).classList.add('active');document.querySelectorAll('.bg-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function updateAspect(){const va=document.getElementById('viewArea'),w=va.offsetWidth;va.style.height=Math.min(Math.round(w*rH/rW),Math.round(window.innerHeight*.52))+'px';}
function updateDots(){for(let i=0;i<shotCount;i++){const d=document.getElementById('d'+i);if(!d)continue;if(i<shots.length)d.className='dot taken';else if(i===shots.length)d.className='dot cur';else d.className='dot';}}
function updateLabel(){document.getElementById('shotLabel').textContent=`${shots.length} / ${shotCount}`;}
function resetShots(){shots=[];overlayItems=[];buildDotRow();switchTab('cam');}
function drawGrad(ctx,css,w,h){const cs=css.match(/#[0-9a-fA-F]{3,8}/g)||['#c77dff','#ff6b9d'];const g=ctx.createLinearGradient(0,0,w,h);cs.forEach((c,i)=>g.addColorStop(i/(cs.length-1),c));ctx.fillStyle=g;ctx.fillRect(0,0,w,h);}
function drawPat(ctx,p,w,h){ctx.save();ctx.globalAlpha=0.3;const m={heart:'❤️',star:'⭐',dot:'⬤',check:'✓',flower:'🌸',cloud:'☁️',rainbow:'🌈',sky:'✈️'};const em=m[p]||'✨';const sz=24;ctx.font=`${sz}px serif`;ctx.textAlign='center';for(let y=sz;y<h+sz;y+=sz*1.8){for(let x=(Math.floor(y/sz)%2===0?0:sz);x<w+sz;x+=sz*2)ctx.fillText(em,x,y);}ctx.restore();}
function switchTab(t){
  document.getElementById('tCam').classList.toggle('active',t==='cam');document.getElementById('tRes').classList.toggle('active',t==='res');
  document.getElementById('camTab').style.display=t==='cam'?'grid':'none';document.getElementById('resTab').style.display=t==='res'?'grid':'none';
  if(t==='res'){if(shots.length===0){switchTab('cam');toast('먼저 사진을 찍어주세요 📸');return;}buildStrip();setTimeout(()=>requestAnimationFrame(resizeOC),150);}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
window.addEventListener('resize',updateAspect);
init();
</script>
